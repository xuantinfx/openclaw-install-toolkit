name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq

      - name: Install dependencies (macos)
        if: runner.os == 'macOS'
        run: brew install shellcheck jq

      - name: Shellcheck
        run: shellcheck install.sh install-skill.sh scripts/sync-skill.sh

      - name: Dry-run smoke test
        env:
          TELEGRAM_BOT_TOKEN: "1234567890:AABBCCDDEEFFGGHHIIJJKKLLMMNNOOPPQQRR"
          ANTHROPIC_API_KEY: "sk-ant-fake-ci-smoke-test-key-not-real"
        run: |
          export OPENCLAW_HOME_OVERRIDE="$(mktemp -d)"
          ./install.sh --port 19000 --dry-run
          cfg="$OPENCLAW_HOME_OVERRIDE/openclaw.json"
          test -f "$cfg" || { echo "config not written"; exit 1; }
          jq -e '.gateway.port == 19000' "$cfg"
          jq -e '.gateway.bind == "loopback"' "$cfg"
          jq -e '.gateway.mode == "local"' "$cfg"
          jq -e '.agents.defaults.model.primary == "anthropic/claude-sonnet-4-6"' "$cfg"
          jq -e '.channels.telegram.enabled == true' "$cfg"
          jq -e '.channels.telegram.botToken == env.TELEGRAM_BOT_TOKEN' "$cfg"
          jq -e '.env.ANTHROPIC_API_KEY == env.ANTHROPIC_API_KEY' "$cfg"
          perms="$(stat -c '%a' "$cfg" 2>/dev/null || stat -f '%Lp' "$cfg")"
          test "$perms" = "600" || { echo "expected 0600, got $perms"; exit 1; }

      - name: install-skill.sh smoke test
        run: |
          set -euo pipefail
          # Build a fixture tarball that mimics the GitHub archive layout:
          # a single top-level dir containing skills/<name>/SKILL.md.
          fixture_root="$(mktemp -d)"
          stage="$fixture_root/openclaw-install-toolkit-main"
          mkdir -p "$stage/skills/test-fixture"
          echo "# Test Fixture Skill" > "$stage/skills/test-fixture/SKILL.md"
          tar -czf "$fixture_root/toolkit.tar.gz" -C "$fixture_root" openclaw-install-toolkit-main

          # Install into an ephemeral $HOME so we don't touch the runner state.
          home_override="$(mktemp -d)"
          mkdir -p "$home_override/.openclaw"

          HOME="$home_override" \
            TOOLKIT_TARBALL_URL="file://$fixture_root/toolkit.tar.gz" \
            TOOLKIT_ALLOW_INSECURE=1 \
            ./install-skill.sh test-fixture

          installed="$home_override/.openclaw/skills/test-fixture/SKILL.md"
          test -f "$installed" || { echo "skill not installed at $installed"; exit 1; }
          grep -q "Test Fixture Skill" "$installed"

          # Idempotency: second run must succeed too.
          HOME="$home_override" \
            TOOLKIT_TARBALL_URL="file://$fixture_root/toolkit.tar.gz" \
            TOOLKIT_ALLOW_INSECURE=1 \
            ./install-skill.sh test-fixture

          # --dry-run must not write anything new (not even the skills/ parent).
          dry_home="$(mktemp -d)"
          mkdir -p "$dry_home/.openclaw"
          HOME="$dry_home" \
            TOOLKIT_TARBALL_URL="file://$fixture_root/toolkit.tar.gz" \
            TOOLKIT_ALLOW_INSECURE=1 \
            ./install-skill.sh --dry-run
          test ! -e "$dry_home/.openclaw/skills" \
            || { echo "--dry-run wrote files"; exit 1; }

          # Unknown skill must exit non-zero with a clear error.
          if HOME="$home_override" \
               TOOLKIT_TARBALL_URL="file://$fixture_root/toolkit.tar.gz" \
               TOOLKIT_ALLOW_INSECURE=1 \
               ./install-skill.sh nonexistent-skill 2>/dev/null; then
            echo "FAIL: bogus skill should have failed"; exit 1
          fi

          # Path-traversal in skill name must be rejected before any fs op.
          if HOME="$home_override" \
               TOOLKIT_TARBALL_URL="file://$fixture_root/toolkit.tar.gz" \
               TOOLKIT_ALLOW_INSECURE=1 \
               ./install-skill.sh '../evil' 2>/dev/null; then
            echo "FAIL: traversal name should have been rejected"; exit 1
          fi

          # Symlink in tarball must be rejected (M3 guard from phase-02 review).
          mal_root="$(mktemp -d)"
          mal_stage="$mal_root/openclaw-install-toolkit-main"
          mkdir -p "$mal_stage/skills/evil"
          echo "# evil" > "$mal_stage/skills/evil/SKILL.md"
          ln -s /etc/passwd "$mal_stage/skills/evil/leak"
          tar -czf "$mal_root/toolkit.tar.gz" -C "$mal_root" openclaw-install-toolkit-main
          if HOME="$home_override" \
               TOOLKIT_TARBALL_URL="file://$mal_root/toolkit.tar.gz" \
               TOOLKIT_ALLOW_INSECURE=1 \
               ./install-skill.sh evil 2>/dev/null; then
            echo "FAIL: symlink tarball should have been rejected"; exit 1
          fi
