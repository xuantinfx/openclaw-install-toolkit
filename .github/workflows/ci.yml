name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq

      - name: Install dependencies (macos)
        if: runner.os == 'macOS'
        run: brew install shellcheck jq

      - name: Shellcheck
        run: shellcheck install.sh scripts/sync-skill.sh

      - name: Dry-run smoke test (config + skills)
        env:
          TELEGRAM_BOT_TOKEN: "1234567890:AABBCCDDEEFFGGHHIIJJKKLLMMNNOOPPQQRR"
          ANTHROPIC_API_KEY: "sk-ant-fake-ci-smoke-test-key-not-real"
        run: |
          set -euo pipefail

          # Stage a fresh copy of install.sh next to a fixture skills/ dir so
          # install_local_skills() resolves ./skills via SCRIPT_DIR.
          stage="$(mktemp -d)"
          cp install.sh "$stage/"
          mkdir -p "$stage/skills/test-fixture"
          cat > "$stage/skills/test-fixture/SKILL.md" <<'EOF'
          # Test Fixture Skill
          EOF

          export OPENCLAW_HOME_OVERRIDE="$(mktemp -d)"
          bash "$stage/install.sh" --port 19000 --dry-run

          cfg="$OPENCLAW_HOME_OVERRIDE/openclaw.json"
          test -f "$cfg" || { echo "config not written"; exit 1; }
          jq -e '.gateway.port == 19000' "$cfg"
          jq -e '.gateway.bind == "loopback"' "$cfg"
          jq -e '.gateway.mode == "local"' "$cfg"
          jq -e '.agents.defaults.model.primary == "anthropic/claude-sonnet-4-6"' "$cfg"
          jq -e '.channels.telegram.enabled == true' "$cfg"
          jq -e '.channels.telegram.botToken == env.TELEGRAM_BOT_TOKEN' "$cfg"
          jq -e '.env.ANTHROPIC_API_KEY == env.ANTHROPIC_API_KEY' "$cfg"
          perms="$(stat -c '%a' "$cfg" 2>/dev/null || stat -f '%Lp' "$cfg")"
          test "$perms" = "600" || { echo "expected 0600, got $perms"; exit 1; }

          # --dry-run must not write the skill to $OPENCLAW_HOME/skills.
          test ! -e "$OPENCLAW_HOME_OVERRIDE/skills/test-fixture" \
            || { echo "--dry-run wrote skill"; exit 1; }

      - name: install_local_skills negative cases
        env:
          TELEGRAM_BOT_TOKEN: "1234567890:AABBCCDDEEFFGGHHIIJJKKLLMMNNOOPPQQRR"
          ANTHROPIC_API_KEY: "sk-ant-fake-ci-smoke-test-key-not-real"
        run: |
          set -euo pipefail

          # Case 1: missing ./skills/ must fail loudly.
          stage_missing="$(mktemp -d)"
          cp install.sh "$stage_missing/"
          export OPENCLAW_HOME_OVERRIDE
          OPENCLAW_HOME_OVERRIDE="$(mktemp -d)"
          if bash "$stage_missing/install.sh" --dry-run 2>/dev/null; then
            echo "FAIL: missing skills/ should have been rejected"; exit 1
          fi

          # Case 2: symlink in skills tree must be rejected.
          stage_symlink="$(mktemp -d)"
          cp install.sh "$stage_symlink/"
          mkdir -p "$stage_symlink/skills/good"
          echo "# good" > "$stage_symlink/skills/good/SKILL.md"
          ln -s /etc/passwd "$stage_symlink/skills/leak"
          OPENCLAW_HOME_OVERRIDE="$(mktemp -d)"
          if bash "$stage_symlink/install.sh" --dry-run 2>/dev/null; then
            echo "FAIL: symlink in skills/ should have been rejected"; exit 1
          fi

          # Case 3: skill dir without SKILL.md must be rejected.
          stage_missing_md="$(mktemp -d)"
          cp install.sh "$stage_missing_md/"
          mkdir -p "$stage_missing_md/skills/no-skill-md"
          OPENCLAW_HOME_OVERRIDE="$(mktemp -d)"
          if bash "$stage_missing_md/install.sh" --dry-run 2>/dev/null; then
            echo "FAIL: missing SKILL.md should have been rejected"; exit 1
          fi

      - name: Idempotency — dry-run twice succeeds
        env:
          TELEGRAM_BOT_TOKEN: "1234567890:AABBCCDDEEFFGGHHIIJJKKLLMMNNOOPPQQRR"
          ANTHROPIC_API_KEY: "sk-ant-fake-ci-smoke-test-key-not-real"
        run: |
          set -euo pipefail
          stage="$(mktemp -d)"
          cp install.sh "$stage/"
          mkdir -p "$stage/skills/test-fixture"
          echo "# Test Fixture" > "$stage/skills/test-fixture/SKILL.md"

          export OPENCLAW_HOME_OVERRIDE="$(mktemp -d)"
          bash "$stage/install.sh" --dry-run
          bash "$stage/install.sh" --dry-run

          # Second run must have backed up the first config.
          ls "$OPENCLAW_HOME_OVERRIDE"/openclaw.json.bak.* >/dev/null \
            || { echo "expected config backup after re-run"; exit 1; }
